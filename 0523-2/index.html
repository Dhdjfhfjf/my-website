<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BITTER - 課堂黑板</title>
    <link rel="stylesheet" href="style.css?v=chalkboard">
</head>
<body>

    <div class="blackboard-container">

        <div class="blackboard-content">
            
            <div class="blackboard-photo">
                <img src="IMG_0083.JPG" alt="黑板磁鐵相片">
            </div>

            <div class="chalk-writing-zone">
                
                <div class="blackboard-header">
                    <p class="blackboard-tag">✎ 值日生板書記錄</p>
                    <h1 class="blackboard-title">著者近影 ／ PROFILE</h1>
                </div>

                <div class="chalk-list-box">
                    <div class="chalk-row"><span class="chalk-label">識別 ／ PEN NAME</span><span class="chalk-value">BITTER / ビター</span></div>
                    <div class="chalk-row"><span class="chalk-label">範疇 ／ STATUS</span><span class="chalk-value" style="color: #ffadad;">日常・委託發佈</span></div>
                    <div class="chalk-row"><span class="chalk-label">現狀 ／ TYPE</span><span class="chalk-value" style="color: #ffea00;">開國準備中（一年B班）</span></div>
                </div>

                <p class="blackboard-tag">✎ 外部聯絡信箋</p>
                <div class="chalk-list-box">
                    <div class="chalk-row">
                        <span class="chalk-label">🔗 Facebook 臉書</span>
                        <span class="chalk-value"><a href="https://www.facebook.com/share/1GRkbWFGGC/?mibextid=wwXIfr" target="_blank" style="color: #c7f9cc; text-decoration: none; font-weight: bold;">[ 翻閱 ✉ ]</a></span>
                    </div>
                    <div class="chalk-row">
                        <span class="chalk-label">🔗 Threads 脆上呢喃</span>
                        <span class="chalk-value"><a href="https://www.threads.com/@kopfkino1110?igshid=NTc4MTIwNjQ2YQ==" target="_blank" style="color: #c7f9cc; text-decoration: none; font-weight: bold;">[ 聆聽 ✉ ]</a></span>
                    </div>
                </div>

                <div class="blackboard-footer">
                    隨時可能低浮，會盡可能留言互動但多數是按表符。<br>
                    有意認識請前往置頂，感謝光臨。
                </div>

            </div>
        </div>

        <div class="chalk-tray">
            <a href="index.html" class="chalk-btn chalk-blue active">關於我</a>
            <a href="character.html" class="chalk-btn chalk-green">御品書</a>
            <a href="music.html" class="chalk-btn chalk-yellow">設定集</a>
            <a href="dislike.html" class="chalk-btn chalk-red">注意書</a>
        </div>

    </div>

</body>
</html>
