    <div class="main-card">

                <span class="pokeball-icon">◓</span>
                <h1 class="site-logo">BITTER</h1>
                <span class="sub-logo">비터</span>
            </div>
        </div>

        <div class="card-body">
            <div class="sidebar">
                <div class="sidebar-img-zone">
                    <img src="cms.PNG" alt="推し">

                <div class="page-title-zone"></div>

                <div class="likes-menu">
                    <a href="index.html" class="menu-item item-fandom active">▶ FANDOM ／ 坑位</a>
