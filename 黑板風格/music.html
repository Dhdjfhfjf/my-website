<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Likes - BITTER</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Yomogi&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-card">
        <div class="card-header">
            <div class="brand-zone">
                <span class="pokeball-icon">✏️</span>
                <h1 class="site-logo">3年B班 // BITTER</h1>
            </div>
            <span class="sub-logo">日直：ビター</span>
        </div>

        <div class="card-body">
            <div class="sidebar">
                <div class="sidebar-img-zone">
                    <img src="IMG_0083.JPG" alt="推し">
                </div>
                <div class="page-title-zone"></div>

                <div class="likes-menu">
                    <a href="index.html" class="menu-item item-fandom">▶ FANDOM ／ 坑位</a>
                    <a href="character.html" class="menu-item item-character">▶ CHARACTER ／ 推し</a>
                    <a href="music.html" class="menu-item item-music active">▶ OC ／ 原創角色</a>
                    <a href="dislike.html" class="menu-item item-dislike">▶ DISLIKE ／ 雷點</a>
                </div>
            </div>

            <div class="content">
                <div class="welcome-section">
                    <div class="category-bar">
                        <span class="category-title">▶ DATABASE</span>
                    </div>
                    <h2 class="main-title">ORIGINAL CHARACTERS</h2>
                    <p class="quote">夏天溶解在我們若無其事的一天</p>
                </div>

                <div class="likes-display-area">
                    <div class="likes-block" style="display: block;">
                        <div class="block-tag">02-C // ORIGINAL CHARACTER</div>
                        <h4 class="block-title">手記 ／ 創作孩子檔案</h4>
                        
                        <div class="oc-simple-list">
                            
                            <div class="oc-simple-item">
                                <div class="oc-s-avatar">
                                    <img src="oc1.jpg" alt="OC 1" onerror="this.style.display='none'">
                                </div>
                                <div class="oc-s-content">
                                    <span class="oc-s-name">◆ 孩子名字 A</span>
                                    <p class="oc-s-desc">主力的原創孩子。版上出現頻率最高，主要用於日常塗鴉或短篇世界觀創作。</p>
                                    <p class="oc-s-desc">（你可以用幾句最簡單的話，說明他在你版面上可能會出現的定位。）</p>
                                </div>
                            </div>

                            <div class="oc-simple-item">
                                <div class="oc-s-avatar">
                                    <img src="oc2.jpg" alt="OC 2" onerror="this.style.display='none'">
                                </div>
                                <div class="oc-s-content">
                                    <span class="oc-s-name">◆ 孩子名字 B</span>
                                    <p class="oc-s-desc">預留的孩子。平時突發奇想才會繪製的次要孩子，簡單記錄於此。</p>
                                </div>
                            </div>

                        </div></div>
                </div>
            </div></div>
    </div>

</body>
</html>
