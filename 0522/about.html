<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCs - BITTER</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-card">

        <div class="card-header">
            <div class="brand-zone">
                <span class="pokeball-icon">◓</span>
                <h1 class="site-logo">BITTER</h1>
                <span class="sub-logo">비터</span>
            </div>
            <nav class="navbar">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="likes.html">Likes</a>
                <a href="oc.html">OCs</a>
            </nav>
        </div>

        <div class="card-body oc-clean-layout">

            <div class="oc-profile-box">
                <div class="oc-avatar-wrapper">
                    <img src="avatar.PNG" alt="角色 A">
                </div>
                <div class="oc-details">
                    <span class="oc-number">#01</span>
                    <h3 class="oc-main-name">角色名字 A</h3>
                    <div class="oc-mini-specs">
                        <span><strong>AGE:</strong> 18</span>
                        <span><strong>HEIGHT:</strong> 175cm</span>
                    </div>
                    <p class="oc-short-bio">
                        一句話簡短介紹這個角色的靈魂（例如：性格冷淡但其實很溫柔的劍士）。字數短短的就好，畫面非常乾淨。
                    </p>
                </div>
            </div>

            <div class="oc-profile-box">
                <div class="oc-avatar-wrapper">
                    <img src="avatar.PNG" alt="角色 B">
                </div>
                <div class="oc-details">
                    <span class="oc-number">#02</span>
                    <h3 class="oc-main-name">角色名字 B</h3>
                    <div class="oc-mini-specs">
                        <span><strong>AGE:</strong> 20</span>
                        <span><strong>HEIGHT:</strong> 162cm</span>
                    </div>
                    <p class="oc-short-bio">
                        一句話簡短介紹角色 B（例如：掌管黑夜的惡魔少女）。兩邊高度完全對齊，絕對清爽。
                    </p>
                </div>
            </div>

        </div>

    </div>

</body>
</html>
